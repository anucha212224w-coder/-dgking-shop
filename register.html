<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก - DG KING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Key<span>Shop</span></a>
    <ul class="nav-links">
      <li><a href="index.html">หน้าแรก</a></li>
      <li><a href="login.html" class="btn btn-outline">เข้าสู่ระบบ</a></li>
    </ul>
  </nav>

  <div class="form-page">
    <div class="form-box">
      <h2>สมัครสมาชิก</h2>
      <p class="form-sub">สร้างบัญชีใหม่เพื่อเริ่มต้นใช้งาน</p>

      <div id="formAlert" class="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" id="username" placeholder="ตัวอักษรและตัวเลข 4-20 ตัว" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
          <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">สมัครสมาชิก</button>
      </form>

      <hr class="divider" />
      <p class="form-footer">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, doc, setDoc } from './js/firebase.js';

    function showAlert(msg, type) {
      const el = document.getElementById('formAlert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!username || !email || !password || !confirm)
        return showAlert('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
      if (password.length < 6)
        return showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
      if (password !== confirm)
        return showAlert('รหัสผ่านไม่ตรงกัน', 'error');

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', cred.user.uid), {
          username,
          email,
          role: 'user',
          createdAt: new Date().toISOString()
        });
        showAlert('สมัครสมาชิกสำเร็จ กำลังไปหน้าเข้าสู่ระบบ...', 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        const msg = err.code === 'auth/email-already-in-use'
          ? 'อีเมลนี้ถูกใช้งานแล้ว'
          : err.code === 'auth/invalid-email'
          ? 'รูปแบบอีเมลไม่ถูกต้อง'
          : 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        showAlert(msg, 'error');
      }
    });
  </script>
</body>
</html>
