<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก - DG KING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="favicon_io/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/i18n.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">DG <span>KING</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">หน้าแรก</a></li>
      <li><a href="login.html" class="btn btn-outline" data-i18n="nav_login">เข้าสู่ระบบ</a></li>
      <li>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="th">TH</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </li>
    </ul>
  </nav>

  <div class="form-page">
    <div class="form-box">
      <h2 data-i18n="register_title">สมัครสมาชิก</h2>
      <p class="form-sub" data-i18n="register_sub">สร้างบัญชีใหม่เพื่อเริ่มต้นใช้งาน</p>

      <div id="formAlert" class="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="username" data-i18n="register_username">ชื่อผู้ใช้</label>
          <input type="text" id="username" data-i18n-placeholder="ph_username" placeholder="ตัวอักษรและตัวเลข 4-20 ตัว" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email" data-i18n="register_email">อีเมล</label>
          <input type="email" id="email" data-i18n-placeholder="ph_email" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password" data-i18n="register_pass">รหัสผ่าน</label>
          <input type="password" id="password" data-i18n-placeholder="ph_pass_min6" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirmPassword" data-i18n="register_confirm_pass">ยืนยันรหัสผ่าน</label>
          <input type="password" id="confirmPassword" data-i18n-placeholder="ph_confirm_pass" placeholder="กรอกรหัสผ่านอีกครั้ง" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="register_btn">สมัครสมาชิก</button>
      </form>

      <hr class="divider" />
      <p class="form-footer"><span data-i18n="register_have_account">มีบัญชีอยู่แล้ว?</span> <a href="login.html" data-i18n="register_login_link">เข้าสู่ระบบ</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, doc, setDoc } from './js/firebase.js';

    function showAlert(msg, type) {
      const el = document.getElementById('formAlert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    function g(key) { return window.i18nGet ? window.i18nGet(key) : key; }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!username || !email || !password || !confirm)
        return showAlert(g('err_fill_all'), 'error');
      if (password.length < 6)
        return showAlert(g('err_pass_short'), 'error');
      if (password !== confirm)
        return showAlert(g('err_pass_mismatch'), 'error');

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', cred.user.uid), {
          username, email, role: 'user', createdAt: new Date().toISOString()
        });
        showAlert(g('success_register'), 'success');
        setTimeout(() => window.location.href = 'login.html', 1500);
      } catch (err) {
        const msg = err.code === 'auth/email-already-in-use'
          ? g('err_email_in_use')
          : err.code === 'auth/invalid-email'
          ? g('err_invalid_email')
          : g('err_generic');
        showAlert(msg, 'error');
      }
    });
  </script>
</body>
</html>
