<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ - DG KING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="favicon_io/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/i18n.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">DG <span>KING</span></a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">หน้าแรก</a></li>
      <li><a href="register.html" class="btn btn-primary" data-i18n="nav_register">สมัครสมาชิก</a></li>
      <li>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="th">TH</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </li>
    </ul>
  </nav>

  <div class="form-page">
    <div class="form-box">
      <h2 data-i18n="login_title">เข้าสู่ระบบ</h2>
      <p class="form-sub" data-i18n="login_sub">ยินดีต้อนรับกลับ กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>

      <div id="formAlert" class="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" data-i18n="login_email">อีเมล</label>
          <input type="email" id="email" data-i18n-placeholder="ph_email" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password" data-i18n="login_pass">รหัสผ่าน</label>
          <input type="password" id="password" data-i18n-placeholder="ph_password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" />
        </div>
        <div style="text-align:right; margin-top:-0.6rem; margin-bottom:1.2rem;">
          <a href="#" id="forgotBtn" style="font-size:0.85rem;" data-i18n="login_forgot">ลืมรหัสผ่าน?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="login_btn">เข้าสู่ระบบ</button>
      </form>

      <hr class="divider" />
      <p class="form-footer"><span data-i18n="login_no_account">ยังไม่มีบัญชี?</span> <a href="register.html" data-i18n="login_register_link">สมัครสมาชิกฟรี</a></p>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, sendPasswordResetEmail } from './js/firebase.js';

    function showAlert(msg, type) {
      const el = document.getElementById('formAlert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    function g(key) { return window.i18nGet ? window.i18nGet(key) : key; }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password)
        return showAlert(g('err_fill_all'), 'error');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert(g('success_login'), 'success');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } catch (err) {
        const msg = err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
          ? g('err_invalid_credential')
          : err.code === 'auth/user-not-found'
          ? g('err_user_not_found')
          : err.code === 'auth/too-many-requests'
          ? g('err_too_many_requests')
          : g('err_generic');
        showAlert(msg, 'error');
      }
    });

    document.getElementById('forgotBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showAlert(g('err_enter_email'), 'error');
      try {
        await sendPasswordResetEmail(auth, email);
        showAlert(g('success_reset_email'), 'success');
      } catch {
        showAlert(g('err_email_not_found'), 'error');
      }
    });
  </script>
</body>
</html>
