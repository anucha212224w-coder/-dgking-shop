<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ข้อมูลส่วนตัว - DG KING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="favicon_io/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/i18n.js"></script>
  <style>
    .profile-wrap {
      max-width: 520px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    .profile-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .profile-card h3 {
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: var(--gold);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.82rem;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); }
    .info-value { color: var(--text); font-weight: 600; }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">DG <span>KING</span></a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" data-i18n="nav_home">หน้าแรก</a></li>
      <li><a href="shop.html" data-i18n="nav_shop">ร้านค้า</a></li>
      <li><a href="download.html" data-i18n="nav_download">ดาวน์โหลด</a></li>
      <li><a href="orders.html" data-i18n="nav_orders">ออเดอร์</a></li>
      <li><a href="contact.html" data-i18n="nav_contact">ติดต่อ</a></li>
      <li><a href="news.html" data-i18n="nav_news">ข่าวสาร</a></li>
      <li><a href="profile.html" class="btn btn-outline" data-i18n="nav_account">บัญชีของฉัน</a></li>
      <li>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="th">TH</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </li>
    </ul>
  </nav>

  <div class="profile-wrap">

    <div class="profile-card">
      <h3 data-i18n="profile_title">ข้อมูลบัญชี</h3>
      <div class="info-row">
        <span class="info-label" data-i18n="profile_username">ชื่อผู้ใช้</span>
        <span class="info-value" id="displayUsername">-</span>
      </div>
      <div class="info-row">
        <span class="info-label" data-i18n="profile_email">อีเมล</span>
        <span class="info-value" id="displayEmail">-</span>
      </div>
      <div class="info-row">
        <span class="info-label" data-i18n="profile_created">วันที่สมัคร</span>
        <span class="info-value" id="displayCreated">-</span>
      </div>
      <div class="info-row">
        <span class="info-label" data-i18n="profile_status">สถานะ</span>
        <span class="info-value" style="color: var(--success);" data-i18n="profile_active">ใช้งานอยู่</span>
      </div>
    </div>

    <!-- POINTS CARD -->
    <div class="profile-card" id="pointsCard" style="display:none;">
      <h3>แต้มสะสม</h3>
      <div style="text-align:center;padding:1rem 0;">
        <div style="font-size:3rem;font-weight:800;color:var(--gold);font-family:'Roboto Condensed',sans-serif;" id="displayPoints">0</div>
        <div style="font-size:0.82rem;color:var(--text-muted);margin-top:0.3rem;">แต้ม</div>
        <div class="points-progress-wrap" style="margin:1rem 0;">
          <div class="points-progress-bar">
            <div class="points-progress-fill" id="pointsProgressFill" style="width:0%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted);margin-top:0.3rem;">
            <span>0</span>
            <span id="pointsTarget">50 แต้ม = คีย์ 1 วันฟรี</span>
          </div>
        </div>
        <div id="redeemSection"></div>
      </div>
    </div>

    <div class="profile-card">
      <h3 data-i18n="profile_change_pass">เปลี่ยนรหัสผ่าน</h3>
      <div id="pwAlert" class="alert"></div>
      <form id="changePasswordForm">
        <div class="form-group">
          <label for="newPassword" data-i18n="profile_new_pass">รหัสผ่านใหม่</label>
          <input type="password" id="newPassword" data-i18n-placeholder="profile_new_pass_ph" placeholder="อย่างน้อย 6 ตัวอักษร" />
        </div>
        <div class="form-group">
          <label for="confirmNewPassword" data-i18n="profile_confirm_pass">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" id="confirmNewPassword" data-i18n-placeholder="profile_confirm_pass_ph" placeholder="กรอกรหัสผ่านอีกครั้ง" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="profile_save_pass">บันทึกรหัสผ่านใหม่</button>
      </form>
    </div>

    <div style="text-align:center;">
      <button id="logoutBtn" class="btn btn-danger" style="width:100%; padding:0.75rem;" data-i18n="profile_logout">ออกจากระบบ</button>
    </div>

  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged, updatePassword, doc, getDoc, updateDoc, addDoc, collection, query, where, getDocs, serverTimestamp, limit } from './js/firebase.js';
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    function g(key) { return window.i18nGet ? window.i18nGet(key) : key; }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = 'login.html';
      currentUser = user;
      document.getElementById('displayEmail').textContent = user.email;

      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const data = snap.data();
        document.getElementById('displayUsername').textContent = data.username || '-';
        if (data.createdAt) {
          const lang = localStorage.getItem('lang') || 'th';
          const d = new Date(data.createdAt);
          document.getElementById('displayCreated').textContent = d.toLocaleDateString(lang === 'en' ? 'en-US' : 'th-TH');
        }

        // Points
        const cfgSnap = await getDoc(doc(db, 'config', 'promotions'));
        const cfg = cfgSnap.exists() ? cfgSnap.data() : {};
        if (cfg.points_active !== false) {
          const points  = data.points || 0;
          const redeem  = cfg.pts_redeem || 50;
          const pct     = Math.min((points / redeem) * 100, 100);
          document.getElementById('pointsCard').style.display = 'block';
          document.getElementById('displayPoints').textContent = points;
          document.getElementById('pointsProgressFill').style.width = pct + '%';
          document.getElementById('pointsTarget').textContent = `${redeem} แต้ม = คีย์ 1 วันฟรี`;
          if (points >= redeem) {
            document.getElementById('redeemSection').innerHTML = `
              <div id="redeemAlert" class="alert" style="display:none;margin-bottom:0.5rem;"></div>
              <button class="btn btn-primary" style="margin-top:0.5rem;" onclick="redeemPoints(${redeem})">
                แลกคีย์ 1 วันฟรี (ใช้ ${redeem} แต้ม)
              </button>`;
          } else {
            document.getElementById('redeemSection').innerHTML = `<p style="font-size:0.8rem;color:var(--text-muted);">อีก ${redeem - points} แต้มจะได้คีย์ฟรี</p>`;
          }
        }
      }
    });

    window.redeemPoints = async function(redeem) {
      console.log('redeemPoints called, redeem:', redeem);
      const userRef  = doc(db, 'users', currentUser.uid);
      const userSnap = await getDoc(userRef);
      const points   = userSnap.data().points || 0;
      const alertEl  = document.getElementById('redeemAlert');
      
      console.log('Current points:', points);

      if (points < redeem) {
        alertEl.textContent = 'แต้มไม่เพียงพอ';
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
        return;
      }

      try {
        // Get a free key
        console.log('Searching for available key...');
        const keysQ  = query(collection(db, 'keys'), where('product', '==', '1 วัน'), where('used', '==', false), limit(1));
        const keysSnap = await getDocs(keysQ);
        
        if (keysSnap.empty) {
          console.log('No keys available');
          alertEl.textContent = 'คีย์หมดสต็อกชั่วคราว กรุณาติดต่อแอดมิน';
          alertEl.className = 'alert alert-error';
          alertEl.style.display = 'block';
          return;
        }

        const keyDoc  = keysSnap.docs[0];
        const keyCode = keyDoc.data().code;
        console.log('Found key:', keyCode);
        
        // Mark key as used
        console.log('Marking key as used...');
        await updateDoc(doc(db, 'keys', keyDoc.id), { used: true, usedAt: serverTimestamp() });
        
        // Deduct points
        console.log('Deducting points...');
        await updateDoc(userRef, { points: points - redeem });
        console.log('Points deducted successfully');
        
        // Create order
        console.log('Creating order...');
        await addDoc(collection(db, 'orders'), {
          uid: currentUser.uid, email: currentUser.email,
          product: '1 วัน', price: 0, status: 'delivered',
          keyCode, keyId: keyDoc.id, redeemed: true,
          createdAt: serverTimestamp()
        });
        console.log('Order created successfully');

        alertEl.innerHTML = `แลกสำเร็จ! คีย์ของคุณ: <strong style="color:var(--gold);font-family:monospace;">${keyCode}</strong>`;
        alertEl.className = 'alert alert-success';
        alertEl.style.display = 'block';
        
        // Reload user data to update UI
        console.log('Reloading user data...');
        const updatedSnap = await getDoc(userRef);
        const updatedPoints = updatedSnap.data().points || 0;
        console.log('Updated points:', updatedPoints);
        
        document.getElementById('displayPoints').textContent = updatedPoints;
        document.getElementById('pointsProgressFill').style.width = ((updatedPoints / redeem) * 100) + '%';
        
        // Hide redeem button if points < redeem threshold
        if (updatedPoints < redeem) {
          const redeemBtn = document.querySelector('#redeemSection button');
          if (redeemBtn) {
            redeemBtn.style.display = 'none';
          }
        }
      } catch (err) {
        console.error('Error in redeemPoints:', err);
        alertEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        alertEl.className = 'alert alert-error';
        alertEl.style.display = 'block';
      }
    };

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw   = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmNewPassword').value;

      if (!newPw || !confirm)
        return showAlert('pwAlert', g('err_fill_all'), 'error');
      if (newPw.length < 6)
        return showAlert('pwAlert', g('err_pass_short'), 'error');
      if (newPw !== confirm)
        return showAlert('pwAlert', g('err_pass_mismatch'), 'error');

      try {
        await updatePassword(auth.currentUser, newPw);
        showAlert('pwAlert', g('success_pass_changed'), 'success');
        document.getElementById('changePasswordForm').reset();
      } catch (err) {
        const msg = err.code === 'auth/requires-recent-login'
          ? g('err_relogin') : g('err_generic');
        showAlert('pwAlert', msg, 'error');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = 'login.html');
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
